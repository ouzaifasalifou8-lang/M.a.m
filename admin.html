<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>OUZAIF Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#6366f1,#8b5cf6);padding:20px 30px}
.header h1{font-size:24px;font-weight:700}
.header p{font-size:13px;opacity:.8;margin-top:4px}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;padding:20px}
.stat{background:#1e293b;border-radius:12px;padding:20px;border-left:4px solid}
.stat.blue{border-color:#6366f1}.stat.green{border-color:#10b981}
.stat.orange{border-color:#f59e0b}.stat.red{border-color:#ef4444}
.stat .num{font-size:28px;font-weight:800}
.stat .label{font-size:12px;color:#94a3b8;margin-top:4px}
.section{padding:0 20px 20px}
.section h2{font-size:16px;font-weight:700;margin-bottom:12px;color:#a5b4fc}
.table-wrap{overflow-x:auto;border-radius:12px}
table{width:100%;border-collapse:collapse;background:#1e293b;font-size:13px}
th{background:#334155;padding:12px;text-align:left;color:#94a3b8;font-weight:600}
td{padding:11px 12px;border-bottom:1px solid #334155}
tr:last-child td{border-bottom:none}
tr:hover td{background:#273448}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.delivered{background:#065f46;color:#6ee7b7}
.shipped{background:#1e3a5f;color:#93c5fd}
.pending{background:#451a03;color:#fcd34d}
.admin{background:#4c1d95;color:#c4b5fd}
.seller{background:#1e3a5f;color:#93c5fd}
.buyer{background:#1f2937;color:#9ca3af}
.rating{color:#f59e0b}
.loading{text-align:center;padding:40px;color:#94a3b8}
.tabs{display:flex;gap:10px;padding:0 20px 15px;overflow-x:auto}
.tab{padding:8px 16px;border-radius:20px;background:#1e293b;color:#94a3b8;cursor:pointer;border:none;font-size:13px;white-space:nowrap}
.tab.active{background:#6366f1;color:white}
.content{display:none}.content.active{display:block}
</style>
</head>
<body>
<div class="header">
  <h1>OUZAIF Marketplace</h1>
  <p id="subtitle">Chargement...</p>
</div>

<div class="stats">
  <div class="stat blue"><div class="num" id="stat-users">-</div><div class="label">Utilisateurs</div></div>
  <div class="stat green"><div class="num" id="stat-products">-</div><div class="label">Produits</div></div>
  <div class="stat orange"><div class="num" id="stat-orders">-</div><div class="label">Commandes</div></div>
  <div class="stat red"><div class="num" id="stat-revenue">-</div><div class="label">Revenu XOF</div></div>
</div>

<div class="tabs">
  <button class="tab active" onclick="showTab('users')">Utilisateurs</button>
  <button class="tab" onclick="showTab('products')">Produits</button>
  <button class="tab" onclick="showTab('orders')">Commandes</button>
  <button class="tab" onclick="showTab('reviews')">Avis</button>
  <button class="tab" onclick="showTab('sellers')">Vendeurs</button>
</div>

<div id="users" class="content active section">
  <h2>Utilisateurs</h2>
  <div class="table-wrap"><table id="tbl-users"><tr><td class="loading">Chargement...</td></tr></table></div>
</div>
<div id="products" class="content section">
  <h2>Produits</h2>
  <div class="table-wrap"><table id="tbl-products"><tr><td class="loading">Chargement...</td></tr></table></div>
</div>
<div id="orders" class="content section">
  <h2>Commandes</h2>
  <div class="table-wrap"><table id="tbl-orders"><tr><td class="loading">Chargement...</td></tr></table></div>
</div>
<div id="reviews" class="content section">
  <h2>Avis clients</h2>
  <div class="table-wrap"><table id="tbl-reviews"><tr><td class="loading">Chargement...</td></tr></table></div>
</div>
<div id="sellers" class="content section">
  <h2>Vendeurs</h2>
  <div class="table-wrap"><table id="tbl-sellers"><tr><td class="loading">Chargement...</td></tr></table></div>
</div>

<script>
const TOKEN = "eyJhbGciOiJFZERTQSIsInR5cCI6IkpXVCJ9.eyJhIjoicnciLCJpYXQiOjE3Nzk5MjQ3MzgsImlkIjoiMDE5ZTZiYmYtN2IwMS03ODAwLTgxMjAtMmIxYWU3ZmY5NDhiIiwicmlkIjoiNTc5N2IxMTMtYWJkNS00NzNmLWE0ZDQtMjg3NDczZmYxOTFiIn0.XbdprTEP9RO1kuQywjbrwcLpTjyf5k4avD6UZrG7Ht54tYEq2_yu-dCmdAfdXvJiUC5M55DjeEf-EdwXvsa8CQ";
const URL = "https://mam-ouzaif.aws-eu-west-1.turso.io/v2/pipeline";

async function query(sql) {
  const res = await fetch(URL, {
    method: "POST",
    headers: {"Authorization": `Bearer ${TOKEN}`, "Content-Type": "application/json"},
    body: JSON.stringify({requests: [{type:"execute", stmt:{sql}}, {type:"close"}]})
  });
  const data = await res.json();
  const result = data.results[0].response.result;
  const cols = result.cols.map(c => c.name);
  return result.rows.map(row => Object.fromEntries(cols.map((c,i) => [c, row[i].value])));
}

function badge(val, type) {
  return `<span class="badge ${val}">${val}</span>`;
}

function showTab(name) {
  document.querySelectorAll('.content').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
  document.getElementById(name).classList.add('active');
  event.target.classList.add('active');
}

async function loadAll() {
  // Stats
  const [users, products, orders, sellers] = await Promise.all([
    query("SELECT * FROM users"),
    query("SELECT * FROM products"),
    query("SELECT * FROM orders"),
    query("SELECT * FROM sellers")
  ]);

  document.getElementById('stat-users').textContent = users.length;
  document.getElementById('stat-products').textContent = products.length;
  document.getElementById('stat-orders').textContent = orders.length;
  const revenue = orders.filter(o => o.status === 'delivered').reduce((s,o) => s + parseFloat(o.total||0), 0);
  document.getElementById('stat-revenue').textContent = revenue.toLocaleString();
  document.getElementById('subtitle').textContent = `Dashboard Administrateur - ${new Date().toLocaleDateString('fr-FR')}`;

  // Users table
  document.getElementById('tbl-users').innerHTML = `
    <tr><th>Nom</th><th>Email</th><th>Role</th><th>Verifie</th></tr>
    ${users.map(u => `<tr><td>${u.full_name}</td><td>${u.email}</td><td>${badge(u.role)}</td><td>${u.is_verified=='1'?'✅':'❌'}</td></tr>`).join('')}`;

  // Products table
  document.getElementById('tbl-products').innerHTML = `
    <tr><th>Nom</th><th>Prix</th><th>Stock</th><th>Note</th><th>Vendus</th></tr>
    ${products.map(p => `<tr><td>${p.name}</td><td>${parseFloat(p.price).toLocaleString()} XOF</td><td>${p.stock}</td><td class="rating">${p.rating}★</td><td>${p.sold_count}</td></tr>`).join('')}`;

  // Orders table
  document.getElementById('tbl-orders').innerHTML = `
    <tr><th>ID</th><th>Total</th><th>Statut</th><th>Date</th></tr>
    ${orders.map(o => `<tr><td>${o.id}</td><td>${parseFloat(o.total).toLocaleString()} XOF</td><td>${badge(o.status)}</td><td>${o.created_at?.substring(0,10)}</td></tr>`).join('')}`;

  // Reviews
  const reviews = await query("SELECT * FROM reviews");
  document.getElementById('tbl-reviews').innerHTML = `
    <tr><th>Titre</th><th>Note</th><th>Commentaire</th></tr>
    ${reviews.map(r => `<tr><td>${r.title}</td><td class="rating">${r.rating}★</td><td>${r.comment}</td></tr>`).join('')}`;

  // Sellers
  document.getElementById('tbl-sellers').innerHTML = `
    <tr><th>Boutique</th><th>Note</th><th>Ventes</th><th>Approuve</th></tr>
    ${sellers.map(s => `<tr><td>${s.shop_name}</td><td class="rating">${s.rating}★</td><td>${s.total_sales}</td><td>${s.is_approved=='1'?'✅':'❌'}</td></tr>`).join('')}`;
}

loadAll();
</script>
</body>
</html>
