<!DOCTYPE html>
<html>
<body>
    <h1>Administration MAMshop</h1>
    <input type="text" id="nom" placeholder="Nom produit">
    <input type="file" id="photo">
    <button onclick="publier()">Publier le produit</button>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = supabase.createClient(
            'https://wnvlziwpoznslrumwgin.supabase.co', 
            'Sb_publishable_c1Fim7EtR3EP1fJu44K4wQ_jsR9Xigz'
        );

        async function publier() {
            const nom = document.getElementById('nom').value;
            const file = document.getElementById('photo').files[0];
            let url = "";

            if (file) {
                const { data } = await supabase.storage.from('medias').upload(Date.now() + "_" + file.name, file);
                url = supabase.storage.from('medias').getPublicUrl(data.path).data.publicUrl;
            }

            const res = await fetch('/api/produits', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ nom, image_url: url })
            });

            if (res.ok) { alert("Succès !"); } else { alert("Erreur."); }
        }
    </script>
</body>
</html>
