<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Administration M.A.M Shop</title>
</head>
<body>
    <h1>Administration M.A.M Shop</h1>
    <section>
        <h2>Ajouter un Service</h2>
        <form id="serviceForm">
            <input type="text" id="nom" placeholder="Nom du service" required>
            <input type="number" id="prix" placeholder="Prix" required>
            <button type="submit">Ajouter</button>
        </form>
    </section>

    <script>
        document.getElementById('serviceForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nom = document.getElementById('nom').value;
            const prix = document.getElementById('prix').value;
            
            try {
                const response = await fetch('/api/add_service.py', {
                    method: 'POST',
                    body: JSON.stringify({ nom, prix })
                });
                
                const result = await response.json();
                if(result.status === "success") {
                    alert("Service ajouté avec succès !");
                    document.getElementById('serviceForm').reset();
                } else {
                    alert("Erreur lors de l'ajout.");
                }
            } catch (error) {
                console.error("Erreur:", error);
                alert("Impossible de contacter l'API.");
            }
        });
    </script>
</body>
</html>
