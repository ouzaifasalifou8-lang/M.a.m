<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin — M.A.M Eshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
</head>
<body>
    <h2>Ajouter un produit</h2>
    <input type="text" id="nom" placeholder="Nom">
    <input type="number" id="prix" placeholder="Prix">
    <input type="file" id="fileInput">
    <button onclick="saveProduct()">Enregistrer</button>

    <script>
        async function saveProduct() {
            const nom = document.getElementById('nom').value;
            const prix = document.getElementById('prix').value;
            const file = document.getElementById('fileInput').files[0];

            try {
                // Utilisation des fonctions de supabase.js
                let imageUrl = '';
                if(file) imageUrl = await uploadImage(file, 'produits'); 
                
                await ajouterProduit({ nom, prix: parseInt(prix), image_url: imageUrl });
                alert("Produit ajouté !");
            } catch(e) {
                alert("Erreur : " + e.message);
            }
        }
    </script>
</body>
</html>
