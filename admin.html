<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Admin - M.A.M Technologie</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h2>Ajouter un produit</h2>
    <input type="text" id="name" placeholder="Nom du produit">
    <input type="number" id="price" placeholder="Prix">
    <textarea id="desc" placeholder="Description"></textarea>
    <input type="file" id="fileInput">
    <button onclick="saveProduct()">Enregistrer</button>

    <script>
        const supabase = supabase.createClient('https://myxxcaaveqbwsujckxhj.supabase.co', 'sb_publishable_A-8fk-zlmgdcTc3WAcx7fA_A0Z0SSJy');

        async function saveProduct() {
            const name = document.getElementById('name').value;
            const price = document.getElementById('price').value;
            const desc = document.getElementById('desc').value;
            const file = document.getElementById('fileInput').files[0];

            if(!name || !price) return alert("Nom et Prix requis !");

            try {
                let imageUrl = '';
                if (file) {
                    const { data, error } = await supabase.storage.from('mam-media').upload(Date.now() + file.name, file);
                    if (error) throw error;
                    imageUrl = supabase.storage.from('mam-media').getPublicUrl(data.path).data.publicUrl;
                }

                const { error } = await supabase.from('products').insert([{ name, price, description: desc, image_url: imageUrl }]);
                if (error) throw error;
                
                alert("Produit ajouté avec succès !");
            } catch (err) {
                alert("Erreur : " + err.message);
            }
        }
    </script>
</body>
</html>
