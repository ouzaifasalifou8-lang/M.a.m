<input type="file" id="imageInput">
<input id="nom" placeholder="Nom du produit">
<input id="prix" placeholder="Prix">
<button id="btnUpload">Publier le produit</button>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-storage.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbLsac6o8g7hFhnUvhn41-57DwDKSzzUg",
    authDomain: "mamanan-8f3d9.firebaseapp.com",
    projectId: "mamanan-8f3d9",
    storageBucket: "mamanan-8f3d9.firebasestorage.app",
    messagingSenderId: "766980373370",
    appId: "1:766980373370:web:64bd2bf510d71dd148b4c3",
    measurementId: "G-9SBJ7G5PYQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const storage = getStorage(app);

  document.getElementById('btnUpload').onclick = async () => {
    const file = document.getElementById('imageInput').files[0];
    const nom = document.getElementById('nom').value;
    const prix = document.getElementById('prix').value;

    const storageRef = ref(storage, 'produits/' + file.name);
    await uploadBytes(storageRef, file);
    const url = await getDownloadURL(storageRef);

    await addDoc(collection(db, "Produits"), { nom, prix, image: url });
    alert("Produit publié avec succès !");
  };
</script>
