<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin - MAM Shop</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: system-ui, sans-serif; background: #0f172a; }
  
  .login-page { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%); }
  .login-box { background: #1e293b; padding: 32px 28px; border-radius: 28px; width: 90%; max-width: 400px; text-align: center; }
  .login-box input { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 9px; color: white; margin-bottom: 14px; }
  .login-box button { width: 100%; padding: 13px; background: #2563eb; color: white; border: none; border-radius: 9px; cursor: pointer; }
  
  .admin-layout { display: flex; min-height: 100vh; }
  .sidebar { width: 260px; background: #0f172a; border-right: 1px solid #1e293b; position: fixed; height: 100vh; overflow-y: auto; }
  .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid #1e293b; }
  .sidebar-logo h2 { color: white; }
  .sidebar-btn { width: 100%; padding: 14px 20px; text-align: left; background: none; border: none; color: #cbd5e1; cursor: pointer; display: flex; align-items: center; gap: 12px; }
  .sidebar-btn:hover { background: #1e293b; }
  .sidebar-btn.active { background: #1e293b; color: #3b82f6; border-left: 3px solid #3b82f6; }
  
  .admin-content { margin-left: 260px; flex: 1; padding: 24px 32px; }
  .admin-title { font-size: 24px; font-weight: 800; color: white; margin-bottom: 24px; }
  
  .form-box { background: #1e293b; border-radius: 20px; padding: 24px; max-width: 600px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; color: #cbd5e1; margin-bottom: 8px; }
  .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 12px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: white; }
  
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
  .product-card { background: #1e293b; border-radius: 12px; overflow: hidden; }
  .product-card .product-img { height: 140px; background: #334155; display: flex; align-items: center; justify-content: center; font-size: 40px; }
  .product-card .product-info { padding: 12px; }
  .product-card .product-name { color: white; font-weight: 700; }
  .product-card .product-price { color: #3b82f6; font-weight: 700; }
  .product-card button { width: 100%; margin-top: 8px; padding: 6px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; }
  
  .stat-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .stat-card { background: #1e293b; border-radius: 16px; padding: 20px; border-left: 4px solid #3b82f6; }
  .stat-card .num { font-size: 32px; font-weight: 800; color: white; }
  .stat-card .lbl { color: #94a3b8; font-size: 13px; }
  
  .table-box { background: #1e293b; border-radius: 16px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th, td { padding: 12px 16px; text-align: left; border-bottom: 1px solid #334155; color: #e2e8f0; }
  
  .toast { position: fixed; bottom: 20px; right: 20px; background: #1e293b; padding: 12px 20px; border-radius: 12px; border-left: 4px solid #10b981; color: white; z-index: 9999; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<div id="login-screen" class="login-page">
  <div class="login-box">
    <h2 style="color:white;margin-bottom:22px">Admin MAM Shop</h2>
    <input id="admin-email" type="email" placeholder="Email" value="admin@mamshop.com">
    <input id="admin-password" type="password" placeholder="Mot de passe">
    <button id="login-btn">Connexion</button>
  </div>
</div>

<div id="admin-screen" class="admin-layout" style="display:none">
  <div class="sidebar">
    <div class="sidebar-logo"><h2>MAM Shop</h2><p>Admin</p></div>
    <button class="sidebar-btn active" data-tab="dashboard">📊 Dashboard</button>
    <button class="sidebar-btn" data-tab="products">🛍️ Produits</button>
    <button class="sidebar-btn" data-tab="add-product">➕ Ajouter produit</button>
    <button class="sidebar-btn" data-tab="categories">📂 Catégories</button>
    <div style="padding:20px;position:absolute;bottom:0">
      <button id="logout-btn" style="background:none;border:none;color:#ef4444;cursor:pointer">Déconnexion</button>
    </div>
  </div>

  <div class="admin-content">
    <div id="tab-dashboard" class="tab-content">
      <div class="admin-title">Dashboard</div>
      <div class="stat-cards">
        <div class="stat-card"><div class="num" id="s-products">-</div><div class="lbl">Produits</div></div>
        <div class="stat-card"><div class="num" id="s-categories">-</div><div class="lbl">Catégories</div></div>
        <div class="stat-card"><div class="num" id="s-orders">-</div><div class="lbl">Commandes</div></div>
      </div>
      <div class="table-box"><table><thead><tr><th>Nom</th><th>Prix</th><th>Stock</th></tr></thead><tbody id="dashboard-products"></tbody></table></div>
    </div>

    <div id="tab-products" class="tab-content" style="display:none">
      <div class="admin-title">Produits</div>
      <div id="products-grid" class="products-grid"></div>
    </div>

    <div id="tab-add-product" class="tab-content" style="display:none">
      <div class="admin-title">Ajouter un produit</div>
      <div class="form-box">
        <div class="form-group"><label>Nom</label><input id="p-name" placeholder="Nom du produit"></div>
        <div class="form-group"><label>Description</label><textarea id="p-desc" rows="3"></textarea></div>
        <div class="form-group"><label>Prix (FCFA)</label><input id="p-price" type="number"></div>
        <div class="form-group"><label>Stock</label><input id="p-stock" type="number" value="0"></div>
        <div class="form-group"><label>Catégorie</label><select id="p-category"></select></div>
        <div class="form-group"><label><input type="checkbox" id="p-featured"> Produit vedette</label></div>
        <button id="save-product-btn" style="width:100%;padding:13px;background:#2563eb;color:white;border:none;border-radius:10px;cursor:pointer">Enregistrer</button>
      </div>
    </div>

    <div id="tab-categories" class="tab-content" style="display:none">
      <div class="admin-title">Catégories</div>
      <div class="form-box" style="margin-bottom:20px">
        <div class="form-group"><label>Nouvelle catégorie</label><input id="new-cat-name" placeholder="Nom"></div>
        <button id="add-cat-btn" style="background:#2563eb;color:white;padding:10px;border:none;border-radius:8px;cursor:pointer">Ajouter</button>
      </div>
      <div class="table-box"><table><thead><tr><th>Nom</th><th>Slug</th></tr></thead><tbody id="categories-list"></tbody></table></div>
    </div>
  </div>
</div>

<script src="js/supabase.js"></script>
<script>
let currentUser = null;

document.getElementById('login-btn').onclick = async () => {
    const email = document.getElementById('admin-email').value;
    const password = document.getElementById('admin-password').value;
    
    const { data, error } = await supabase.auth.signInWithPassword({ email, password });
    
    if (error) {
        showToast('Email ou mot de passe incorrect', 'error');
    } else {
        currentUser = data.user;
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('admin-screen').style.display = 'flex';
        loadDashboard();
        loadProducts();
        loadCategories();
        showToast('Connexion réussie');
    }
};

document.getElementById('logout-btn').onclick = async () => {
    await supabase.auth.signOut();
    document.getElementById('admin-screen').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
};

document.querySelectorAll('.sidebar-btn').forEach(btn => {
    btn.onclick = () => {
        document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
        document.getElementById(`tab-${btn.dataset.tab}`).style.display = 'block';
        document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        if (btn.dataset.tab === 'products') loadProducts();
        if (btn.dataset.tab === 'categories') loadCategories();
        if (btn.dataset.tab === 'add-product') loadCategorySelect();
    };
});

async function loadDashboard() {
    const products = await getProducts();
    const categories = await getCategories();
    document.getElementById('s-products').textContent = products.length;
    document.getElementById('s-categories').textContent = categories.length;
    document.getElementById('s-orders').textContent = '0';
    
    const tbody = document.getElementById('dashboard-products');
    tbody.innerHTML = products.slice(0,5).map(p => `<tr><td>${p.name}</td><td>${p.price} FCFA</td><td>${p.stock}</td>`).join('');
}

async function loadProducts() {
    const products = await getProducts();
    const grid = document.getElementById('products-grid');
    grid.innerHTML = products.map(p => `
        <div class="product-card">
            <div class="product-img">🛍️</div>
            <div class="product-info">
                <div class="product-name">${p.name}</div>
                <div class="product-price">${p.price} FCFA</div>
                <button onclick="deleteProduct('${p.id}')">Supprimer</button>
            </div>
        </div>
    `).join('');
}

async function loadCategories() {
    const categories = await getCategories();
    const tbody = document.getElementById('categories-list');
    tbody.innerHTML = categories.map(c => `<tr><td>${c.name}</td><td>${c.slug}</td>`).join('');
}

async function loadCategorySelect() {
    const categories = await getCategories();
    const select = document.getElementById('p-category');
    select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
}

document.getElementById('save-product-btn').onclick = async () => {
    const name = document.getElementById('p-name').value;
    const price = parseFloat(document.getElementById('p-price').value);
    const stock = parseInt(document.getElementById('p-stock').value);
    const categoryId = document.getElementById('p-category').value;
    const featured = document.getElementById('p-featured').checked;
    
    if (!name || !price) {
        showToast('Nom et prix requis', 'error');
        return;
    }
 const { data, error } = await supabase.from('products').insert([{
        name, price, stock, category_id: categoryId, is_featured: featured, is_active: true, slug: name.toLowerCase().replace(/\s+/g, '-')
    }]);
    
    if (error) {
        showToast('Erreur: ' + error.message, 'error');
    } else {
        showToast('Produit ajouté');
        document.getElementById('p-name').value = '';
        document.getElementById('p-price').value = '';
        document.getElementById('p-stock').value = '0';
        document.getElementById('p-featured').checked = false;
        loadProducts();
        loadDashboard();
    }
};

document.getElementById('add-cat-btn').onclick = async () => {
    const name = document.getElementById('new-cat-name').value;
    if (!name) return;
    
    const { error } = await supabase.from('categories').insert([{
        name, slug: name.toLowerCase().replace(/\s+/g, '-'), is_active: true
    }]);
    
    if (!error) {
        showToast('Catégorie ajoutée');
        document.getElementById('new-cat-name').value = '';
        loadCategories();
        loadCategorySelect();
    }
};

async function deleteProduct(id) {
    if (!confirm('Supprimer ce produit ?')) return;
    await supabase.from('products').update({ is_active: false }).eq('id', id);
    loadProducts();
    loadDashboard();
}

function showToast(message, type = 'success') {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.textContent = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
}

window.deleteProduct = deleteProduct;
</script>
</body>
</html>
