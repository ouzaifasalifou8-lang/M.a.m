<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Test M.A.Mshop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">
    <div class="max-w-md mx-auto bg-white p-8 rounded shadow">
        <form id="productForm">
            <input type="text" id="name" placeholder="Nom" class="w-full border p-2 mb-2">
            <input type="number" id="price" placeholder="Prix" class="w-full border p-2 mb-2">
            <button type="submit" id="submitBtn" class="bg-blue-600 text-white w-full py-2">Tester</button>
        </form>
    </div>

    <script>
        // 1. Initialisation directe ici pour être sûr
        const supabaseUrl = 'https://dzbomxdmnznzykppbguh.supabase.co';
        const supabaseKey = 'sb_publishable_09bNEz6hpAH_QeD91-dhZw_ufVBhDlS'; // REMPLACEZ PAR VOTRE CLÉ
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            try {
                // Test simple sans fichier pour isoler le problème
                console.log("Tentative d'insertion...");
                
                const { error } = await supabase
                    .from('products')
                    .insert([{ name: 'Test', price: 100 }]);

                if (error) throw error;
                alert('Réussi !');
            } catch (err) {
                alert('Erreur : ' + err.message);
                console.error(err);
            }
        });
    </script>
</body>
</html>
