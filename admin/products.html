<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produits - M.A.Mshop Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="flex">
        <!-- Sidebar identique -->
        <div class="sidebar w-64 min-h-screen text-white fixed" style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);">
            <div class="p-6">
                <div class="flex items-center space-x-2 mb-8">
                    <i class="fas fa-store text-2xl"></i>
                    <span class="text-xl font-bold">M.A.Mshop Admin</span>
                </div>
                <nav class="space-y-2">
                    <a href="index.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="products.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-white/20">
                        <i class="fas fa-box"></i>
                        <span>Produits</span>
                    </a>
                    <a href="orders.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Commandes</span>
                    </a>
                    <a href="sellers.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-users"></i>
                        <span>Vendeurs</span>
                    </a>
                    <a href="installations.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-tools"></i>
                        <span>Installations</span>
                    </a>
                    <a href="deliveries.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-truck"></i>
                        <span>Livraisons</span>
                    </a>
                    <a href="settings.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-cog"></i>
                        <span>Paramètres</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 ml-64">
            <div class="bg-white shadow-sm px-6 py-4 flex justify-between items-center">
                <h1 class="text-2xl font-bold text-gray-800">Gestion des produits</h1>
                <button onclick="openProductModal()" class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
                    <i class="fas fa-plus mr-2"></i>Ajouter un produit
                </button>
            </div>

            <div class="p-6">
                <!-- Filtres -->
                <div class="bg-white rounded-lg p-4 mb-6">
                    <div class="flex flex-wrap gap-4">
                        <input type="text" id="searchProduct" placeholder="Rechercher un produit..." class="flex-1 px-4 py-2 border rounded-lg">
                        <select id="categoryFilter" class="px-4 py-2 border rounded-lg">
                            <option value="all">Toutes catégories</option>
                            <option value="electronics">Électronique</option>
                            <option value="antennas">Antennes</option>
                            <option value="installation">Installation</option>
                        </select>
                        <button onclick="filterProducts()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-search mr-2"></i>Filtrer
                        </button>
                    </div>
                </div>

                <!-- Liste des produits -->
                <div id="productsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Chargement dynamique -->
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Ajout/Modification Produit -->
    <div id="productModal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-lg w-full max-w-2xl mx-4">
            <div class="p-6">
                <h2 id="modalTitle" class="text-2xl font-bold mb-4">Ajouter un produit</h2>
                <form id="productForm">
                    <input type="hidden" id="productId">
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium mb-1">Nom du produit *</label>
                            <input type="text" id="productName" required class="w-full px-3 py-2 border rounded-lg">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Description</label>
                            <textarea id="productDescription" rows="3" class="w-full px-3 py-2 border rounded-lg"></textarea>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-sm font-medium mb-1">Prix (FCFA) *</label>
                                <input type="number" id="productPrice" required class="w-full px-3 py-2 border rounded-lg">
                            </div>
                            <div>
                                <label class="block text-sm font-medium mb-1">Stock *</label>
                                <input type="number" id="productStock" required class="w-full px-3 py-2 border rounded-lg">
                            </div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1">Catégorie</label>
                            <select id="productCategory" class="w-full px-3 py-2 border rounded-lg">
                                <option value="electronics">Électronique</option>
                                <option value="antennas">Antennes</option>
                                <option value="installation">Installation</option>
                            </select>
                        </div>
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" id="productActive" class="mr-2" checked>
                                <span class="text-sm">Produit actif</span>
                            </label>
                        </div>
                    </div>
                    <div class="flex justify-end space-x-3 mt-6">
                        <button type="button" onclick="closeProductModal()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">Annuler</button>
                        <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Enregistrer</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let currentUser = null;

        async function loadProducts() {
            try {
                let query = supabase
                    .from('products')
                    .select('*, user_profiles!seller_id(display_name)')
                    .order('created_at', { ascending: false });

                const search = document.getElementById('searchProduct')?.value;
                if (search) {
                    query = query.ilike('name', `%${search}%`);
                }

                const { data: products } = await query;

                const container = document.getElementById('productsList');
                if (products && products.length > 0) {
                    container.innerHTML = products.map(product => `
                        <div class="bg-white rounded-lg shadow-lg overflow-hidden">
                            <div class="p-4">
                                <div class="flex justify-between items-start">
                                    <h3 class="font-semibold text-lg">${product.name}</h3>
                                    <div class="flex space-x-2">
                                        <button onclick="editProduct('${product.id}')" class="text-blue-600 hover:text-blue-800">
                                            <i class="fas fa-edit"></i>
                                        </button>
                                        <button onclick="deleteProduct('${product.id}')" class="text-red-600 hover:text-red-800">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </div>
                                </div>
                                <p class="text-gray-600 text-sm mt-2">${product.description?.substring(0, 100) || ''}...</p>
                                <div class="mt-4">
                                    <p class="text-2xl font-bold text-blue-600">${product.price.toLocaleString()} FCFA</p>
                                    <p class="text-sm text-gray-500 mt-1">Stock: ${product.stock} unités</p>
                                    <p class="text-sm text-gray-500">Vendeur: ${product.user_profiles?.display_name || 'Admin'}</p>
                                    <div class="mt-3 flex justify-between items-center">
                                        <span class="px-2 py-1 rounded-full text-xs ${product.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                                            ${product.is_active ? 'Actif' : 'Inactif'}
                                        </span>
                                        <button onclick="toggleProductStatus('${product.id}', ${!product.is_active})" 
                                                class="text-sm text-blue-600 hover:underline">
                                            ${product.is_active ? 'Désactiver' : 'Activer'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="col-span-3 text-center py-12">Aucun produit trouvé</div>';
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        function openProductModal(productId = null) {
            document.getElementById('productModal').classList.add('flex');
            if (productId) {
                document.getElementById('modalTitle').innerText = 'Modifier le produit';
                loadProductData(productId);
            } else {
                document.getElementById('modalTitle').innerText = 'Ajouter un produit';
                document.getElementById('productForm').reset();
                document.getElementById('productId').value = '';
            }
        }

        async function loadProductData(productId) {
            const { data: product } = await supabase
                .from('products')
                .select('*')
                .eq('id', productId)
                .single();

            if (product) {
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productDescription').value = product.description || '';
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productStock').value = product.stock;
                document.getElementById('productActive').checked = product.is_active;
            }
        }

        document.getElementById('productForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const productData = {
                name: document.getElementById('productName').value,
                description: document.getElementById('productDescription').value,
                price: parseFloat(document.getElementById('productPrice').value),
                stock: parseInt(document.getElementById('productStock').value),
                is_active: document.getElementById('productActive').checked,
                seller_id: currentUser?.id || (await checkUser())?.id
            };

            const productId = document.getElementById('productId').value;
            
            try {
                let result;
                if (productId) {
                    result = await supabase
                        .from('products')
                        .update(productData)
                        .eq('id', productId);
                } else {
                    result = await supabase
                        .from('products')
                        .insert([productData]);
                }

                if (result.error) throw result.error;
                
                showToast(productId ? 'Produit modifié avec succès' : 'Produit ajouté avec succès');
                closeProductModal();
                loadProducts();
            } catch (error) {
                showToast('Erreur lors de l\'enregistrement', 'error');
            }
        });

        async function deleteProduct(productId) {
            if (confirm('Êtes-vous sûr de vouloir supprimer ce produit ?')) {
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .eq('id', productId);
                
                if (error) {
                    showToast('Erreur lors de la suppression', 'error');
                } else {
                    showToast('Produit supprimé avec succès');
                    loadProducts();
                }
            }
        }

        async function toggleProductStatus(productId, newStatus) {
            const { error } = await supabase
                .from('products')
                .update({ is_active: newStatus })
                .eq('id', productId);
            
            if (error) {
                showToast('Erreur lors du changement de statut', 'error');
            } else {
                showToast('Statut modifié avec succès');
                loadProducts();
            }
        }

        function filterProducts() {
            loadProducts();
        }

        function closeProductModal() {
            document.getElementById('productModal').classList.remove('flex');
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} z-50`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Initialisation
        async function init() {
            const user = await checkUser();
            if (!user) {
                window.location.href = '../login.html';
                return;
            }
            currentUser = user;
            loadProducts();
        }

        init();
    </script>
</body>
    </html>
