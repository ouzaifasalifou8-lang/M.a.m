<form id="productForm" class="space-y-4">
    <div>
        <label class="block text-sm font-medium">Nom du produit</label>
        <input type="text" id="name" required class="w-full border p-2 rounded">
    </div>
    <div>
        <label class="block text-sm font-medium">Prix (FCFA)</label>
        <input type="number" id="price" required class="w-full border p-2 rounded">
    </div>
    <div>
        <label class="block text-sm font-medium">Image ou Vidéo</label>
        <input type="file" id="mediaFile" accept="image/*,video/*" class="w-full border p-2 rounded">
    </div>
    <button type="submit" id="submitBtn" class="bg-blue-600 text-white w-full py-2 rounded">
        Enregistrer le produit
    </button>
</form>

<script>
    document.getElementById('productForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        btn.innerText = 'Enregistrement...';

        const name = document.getElementById('name').value;
        const price = document.getElementById('price').value;
        const file = document.getElementById('mediaFile').files[0];
        let mediaUrl = '';

        // 1. Upload du média dans le bucket 'media'
        if (file) {
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;
            const { data, error } = await supabase.storage
                .from('media')
                .upload(fileName, file);
            
            if (error) { alert('Erreur upload image'); return; }
            const { data: publicUrl } = supabase.storage.from('media').getPublicUrl(fileName);
            mediaUrl = publicUrl.publicUrl;
        }

        // 2. Insertion dans la table products
        const { error } = await supabase
            .from('products')
            .insert([{ name, price, attributes: { mediaUrl } }]);

        if (error) {
            alert('Erreur base de données : ' + error.message);
        } else {
            alert('Succès ! Le produit est dans Supabase.');
            location.reload();
        }
        btn.innerText = 'Enregistrer le produit';
    });
</script>
