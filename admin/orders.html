<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commandes - M.A.Mshop Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50">
    <div class="flex">
        <!-- Sidebar identique à index.html -->
        <div class="sidebar w-64 min-h-screen text-white fixed" style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);">
            <div class="p-6">
                <div class="flex items-center space-x-2 mb-8">
                    <i class="fas fa-store text-2xl"></i>
                    <span class="text-xl font-bold">M.A.Mshop Admin</span>
                </div>
                <nav class="space-y-2">
                    <a href="index.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-chart-line"></i>
                        <span>Dashboard</span>
                    </a>
                    <a href="products.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-box"></i>
                        <span>Produits</span>
                    </a>
                    <a href="orders.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg bg-white/20">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Commandes</span>
                    </a>
                    <a href="sellers.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-users"></i>
                        <span>Vendeurs</span>
                    </a>
                    <a href="installations.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-tools"></i>
                        <span>Installations</span>
                    </a>
                    <a href="deliveries.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-truck"></i>
                        <span>Livraisons</span>
                    </a>
                    <a href="settings.html" class="flex items-center space-x-3 px-4 py-3 rounded-lg hover:bg-white/10">
                        <i class="fas fa-cog"></i>
                        <span>Paramètres</span>
                    </a>
                </nav>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 ml-64">
            <div class="bg-white shadow-sm px-6 py-4">
                <h1 class="text-2xl font-bold text-gray-800">Gestion des commandes</h1>
            </div>

            <div class="p-6">
                <!-- Filtres -->
                <div class="bg-white rounded-lg p-4 mb-6">
                    <div class="flex flex-wrap gap-4">
                        <select id="statusFilter" class="px-4 py-2 border rounded-lg">
                            <option value="all">Tous les statuts</option>
                            <option value="pending">En attente</option>
                            <option value="processing">En traitement</option>
                            <option value="shipped">Expédiée</option>
                            <option value="delivered">Livrée</option>
                            <option value="cancelled">Annulée</option>
                        </select>
                        <input type="date" id="dateFilter" class="px-4 py-2 border rounded-lg">
                        <input type="text" id="searchInput" placeholder="Rechercher par ID ou client..." class="flex-1 px-4 py-2 border rounded-lg">
                        <button onclick="filterOrders()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700">
                            <i class="fas fa-search mr-2"></i>Filtrer
                        </button>
                    </div>
                </div>

                <!-- Tableau des commandes -->
                <div class="bg-white rounded-lg overflow-hidden">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-sm font-semibold">ID Commande</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold">Client</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold">Total</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold">Statut</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold">Date</th>
                                <th class="px-6 py-3 text-left text-sm font-semibold">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="ordersTable">
                            <tr><td colspan="6" class="text-center py-8">Chargement...</td></tr>
                        </tbody>
                    </table>
                </div>

                <!-- Pagination -->
                <div class="flex justify-between items-center mt-6">
                    <button id="prevPage" onclick="previousPage()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">
                        <i class="fas fa-chevron-left"></i> Précédent
                    </button>
                    <span id="pageInfo" class="text-gray-600">Page 1</span>
                    <button id="nextPage" onclick="nextPage()" class="px-4 py-2 border rounded-lg hover:bg-gray-50">
                        Suivant <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="../js/supabase.js"></script>
    <script>
        let currentPage = 1;
        let totalPages = 1;
        let currentFilters = { status: 'all', date: '', search: '' };

        async function loadOrders() {
            try {
                let query = supabase
                    .from('orders')
                    .select(`
                        *,
                        user_profiles (display_name, phone)
                    `, { count: 'exact' })
                    .order('created_at', { ascending: false })
                    .range((currentPage - 1) * 20, currentPage * 20 - 1);

                if (currentFilters.status !== 'all') {
                    query = query.eq('status', currentFilters.status);
                }
                if (currentFilters.date) {
                    query = query.gte('created_at', currentFilters.date);
                }
                if (currentFilters.search) {
                    query = query.textSearch('id', currentFilters.search);
                }

                const { data: orders, count } = await query;
                totalPages = Math.ceil(count / 20);
                document.getElementById('pageInfo').innerHTML = `Page ${currentPage} sur ${totalPages}`;

                const tableBody = document.getElementById('ordersTable');
                if (orders && orders.length > 0) {
                    tableBody.innerHTML = orders.map(order => `
                        <tr class="border-t hover:bg-gray-50">
                            <td class="px-6 py-4 font-mono text-sm">${order.id.slice(0, 8)}...</td>
                            <td class="px-6 py-4">
                                <div class="font-medium">${order.user_profiles?.display_name || 'Client'}</div>
                                <div class="text-sm text-gray-500">${order.user_profiles?.phone || '-'}</div>
                            </td>
                            <td class="px-6 py-4 font-semibold">${order.total.toLocaleString()} FCFA</td>
                            <td class="px-6 py-4">
                                <select onchange="updateOrderStatus('${order.id}', this.value)" 
                                        class="px-3 py-1 rounded-full text-sm font-medium border
                                        ${order.status === 'delivered' ? 'bg-green-100 text-green-700 border-green-200' : ''}
                                        ${order.status === 'pending' ? 'bg-yellow-100 text-yellow-700 border-yellow-200' : ''}
                                        ${order.status === 'processing' ? 'bg-blue-100 text-blue-700 border-blue-200' : ''}
                                        ${order.status === 'shipped' ? 'bg-purple-100 text-purple-700 border-purple-200' : ''}
                                        ${order.status === 'cancelled' ? 'bg-red-100 text-red-700 border-red-200' : ''}">
                                    <option value="pending" ${order.status === 'pending' ? 'selected' : ''}>En attente</option>
                                    <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>En traitement</option>
                                    <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Expédiée</option>
                                    <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Livrée</option>
                                    <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Annulée</option>
                                </select>
                            </td>
                            <td class="px-6 py-4 text-sm">${new Date(order.created_at).toLocaleDateString('fr-FR')}</td>
                            <td class="px-6 py-4">
                                <button onclick="viewOrderDetails('${order.id}')" class="text-blue-600 hover:text-blue-800 mr-3">
                                    <i class="fas fa-eye"></i>
                                </button>
                                <button onclick="printOrder('${order.id}')" class="text-gray-600 hover:text-gray-800">
                                    <i class="fas fa-print"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center py-8">Aucune commande trouvée</td></tr>';
                }
            } catch (error) {
                console.error('Erreur:', error);
            }
        }

        async function updateOrderStatus(orderId, newStatus) {
            try {
                const { error } = await supabase
                    .from('orders')
                    .update({ status: newStatus })
                    .eq('id', orderId);

                if (error) throw error;
                
                showToast('Statut mis à jour avec succès');
                loadOrders();
            } catch (error) {
                showToast('Erreur lors de la mise à jour', 'error');
            }
        }

        function filterOrders() {
            currentFilters = {
                status: document.getElementById('statusFilter').value,
                date: document.getElementById('dateFilter').value,
                search: document.getElementById('searchInput').value
            };
            currentPage = 1;
            loadOrders();
        }

        function viewOrderDetails(orderId) {
            window.location.href = `order-detail.html?id=${orderId}`;
        }

        function printOrder(orderId) {
            window.open(`print-order.html?id=${orderId}`, '_blank');
        }

        function previousPage() {
            if (currentPage > 1) {
                currentPage--;
                loadOrders();
            }
        }

        function nextPage() {
            if (currentPage < totalPages) {
                currentPage++;
                loadOrders();
            }
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-4 right-4 px-6 py-3 rounded-lg text-white ${type === 'success' ? 'bg-green-500' : 'bg-red-500'} z-50`;
            toast.innerHTML = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        loadOrders();
    </script>
</body>
</html>
