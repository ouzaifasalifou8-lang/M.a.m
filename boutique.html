<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Boutique - MAM Shop</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><div class="logo-icon">M</div>MAM Shop</a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="boutique.html" class="active">Boutique</a>
      <a href="antennes.html">Services</a>
      <a href="marketplace.html">Marketplace</a>
      <a href="a-propos.html">A propos</a>
    </div>
    <div class="nav-actions">
      <button class="cart-btn" onclick="location.href='panier.html'">🛒 Panier<span class="cart-count" style="display:none">0</span></button>
      <a href="compte.html" class="btn btn-primary">Connexion</a>
    </div>
  </div>
</nav>

<div class="hero" style="padding:40px 20px">
  <h1 style="font-size:34px">Boutique</h1>
  <p>Tous nos produits au meilleur prix</p>
</div>

<div class="section">
  <div class="container">
    <div style="display:flex;gap:12px;margin-bottom:28px;flex-wrap:wrap">
      <input type="text" id="search" placeholder="Rechercher un produit..."
        style="flex:1;min-width:200px;padding:12px 16px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;outline:none">
      <select id="cat-filter"
        style="padding:12px 16px;border:1px solid #e2e8f0;border-radius:9px;font-size:13px;min-width:170px;outline:none;background:white">
        <option value="">Toutes categories</option>
      </select>
      <button onclick="loadProducts()" class="btn btn-primary">Rechercher</button>
    </div>
    <div class="grid-cards" id="products-grid">
      <div style="grid-column:1/-1;text-align:center;padding:50px;color:#64748b">Chargement...</div>
    </div>
  </div>
</div>

<footer>
  <div class="footer-bottom" style="padding:20px">© 2026 MAM Shop - Tous droits reserves | <a href="index.html" style="color:#94a3b8">Accueil</a></div>
</footer>

<script src="js/api.js"></script>
<script>
async function init(){
  const cats=await sbGet('categories','is_active=eq.true&order=name');
  const sel=document.getElementById('cat-filter');
  if(Array.isArray(cats)) cats.forEach(c=>sel.innerHTML+=`<option value="${c.id}">${c.name}</option>`);
  loadProducts();
}

async function loadProducts(){
  const search=document.getElementById('search').value.trim();
  const cat=document.getElementById('cat-filter').value;
  let params='is_active=eq.true&order=created_at.desc&limit=60';
  if(cat) params+=`&category_id=eq.${cat}`;
  const el=document.getElementById('products-grid');
  el.innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:#64748b">Chargement...</div>';
  let products=await sbGet('products',params);
  if(!Array.isArray(products)) products=[];
  if(search) products=products.filter(p=>p.name?.toLowerCase().includes(search.toLowerCase())||p.description?.toLowerCase().includes(search.toLowerCase()));
  renderProducts(products,'products-grid');
}

document.getElementById('search').addEventListener('keydown',e=>e.key==='Enter'&&loadProducts());
init();
</script>
</body>
</html>
