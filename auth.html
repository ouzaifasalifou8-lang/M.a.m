<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M.A.M Eshop — Administration</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #060c14;
    --bg2: #0a1525;
    --accent: #00c8ff;
    --text: #e8f0fe;
    --muted: #7a9bc0;
    --border: rgba(0,200,255,0.15);
    --error: #ff4757;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse at 30% 50%, rgba(0,200,255,0.06) 0%, transparent 60%),
      radial-gradient(ellipse at 70% 50%, rgba(0,100,200,0.04) 0%, transparent 60%);
    pointer-events: none;
  }
  .login-box {
    background: rgba(10,21,37,0.9);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 44px;
    width: 100%;
    max-width: 420px;
    position: relative;
    z-index: 1;
    backdrop-filter: blur(20px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5);
  }
  .login-logo {
    text-align: center;
    margin-bottom: 36px;
  }
  .login-logo .icon {
    font-size: 2.8rem;
    display: block;
    margin-bottom: 12px;
    filter: drop-shadow(0 0 16px rgba(0,200,255,0.4));
  }
  .login-logo h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .login-logo h1 span { color: var(--accent); }
  .login-logo p {
    color: var(--muted);
    font-size: 0.82rem;
    margin-top: 4px;
    text-transform: uppercase;
    letter-spacing: 2px;
  }
  .form-group { margin-bottom: 18px; }
  .form-group label {
    display: block;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .form-group input {
    width: 100%;
    background: rgba(15,30,53,0.8);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 13px 16px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-group input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,200,255,0.1);
  }
  .btn-login {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    padding: 14px;
    border-radius: 8px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 8px;
  }
  .btn-login:hover {
    background: #00e0ff;
    box-shadow: 0 8px 24px rgba(0,200,255,0.3);
  }
  .btn-login:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .error-msg {
    background: rgba(255,71,87,0.1);
    border: 1px solid rgba(255,71,87,0.3);
    color: var(--error);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 0.88rem;
    margin-top: 16px;
    display: none;
  }
  .back-link {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: var(--muted);
    font-size: 0.85rem;
    text-decoration: none;
    transition: color 0.2s;
  }
  .back-link:hover { color: var(--accent); }
</style>
</head>
<body>
<div class="login-box">
  <div class="login-logo">
    <span class="icon">📡</span>
    <h1>M.A.M <span>Eshop</span></h1>
    <p>Espace Administrateur</p>
  </div>
  <div class="form-group">
    <label>Adresse Email</label>
    <input type="email" id="email" placeholder="admin@mameshop.ne" autocomplete="email">
  </div>
  <div class="form-group">
    <label>Mot de passe</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>
  <button class="btn-login" id="btnLogin" onclick="login()">🔐 Se connecter</button>
  <div class="error-msg" id="errorMsg"></div>
  <a href="index.html" class="back-link">← Retour au site</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script>
  // Rediriger si déjà connecté
  (async () => {
    const session = await getSession();
    if (session) window.location.href = 'admin.html';
  })();

  async function login() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('btnLogin');
    const err = document.getElementById('errorMsg');

    if (!email || !password) {
      showError('Veuillez remplir tous les champs.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Connexion...';
    err.style.display = 'none';

    try {
      await loginAdmin(email, password);
      window.location.href = 'admin.html';
    } catch (e) {
      showError('Email ou mot de passe incorrect.');
      btn.disabled = false;
      btn.textContent = '🔐 Se connecter';
    }
  }

  function showError(msg) {
    const err = document.getElementById('errorMsg');
    err.textContent = msg;
    err.style.display = 'block';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });
</script>
</body>
</html>
