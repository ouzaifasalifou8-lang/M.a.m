<div id="boutique" style="display: flex; gap: 20px;"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/9.6.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAbLsac6o8g7hFhnUvhn41-57DwDKSzzUg",
    authDomain: "mamanan-8f3d9.firebaseapp.com",
    projectId: "mamanan-8f3d9",
    storageBucket: "mamanan-8f3d9.firebasestorage.app",
    messagingSenderId: "766980373370",
    appId: "1:766980373370:web:64bd2bf510d71dd148b4c3",
    measurementId: "G-9SBJ7G5PYQ"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  onSnapshot(collection(db, "Produits"), (snapshot) => {
    const conteneur = document.getElementById('boutique');
    conteneur.innerHTML = "";
    snapshot.forEach((doc) => {
      const p = doc.data();
      conteneur.innerHTML += `
        <div style="border: 1px solid #ccc; padding: 10px;">
          <img src="${p.image}" width="150">
          <h3>${p.nom}</h3>
          <p>${p.prix} FCFA</p>
        </div>`;
    });
  });
</script>
