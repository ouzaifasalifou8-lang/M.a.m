<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Upload Simple</title>
</head>
<body>
    <h2>Upload Image</h2>
    <input type="file" id="fileInput">
    <button onclick="upload()">Upload</button>
    <div id="result"></div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabase = window.supabase.createClient(
            'https://wnvlziwpoznslrumwgin.supabase.co',
            'sb_publishable_c1Fim7EtR3EP1fJu44K4wQ_jsR9Xigz'
        );
        
        async function upload() {
            const file = document.getElementById('fileInput').files[0];
            if (!file) return alert('Choisissez un fichier');
            
            const result = document.getElementById('result');
            result.innerHTML = 'Upload...';
            
            const { data, error } = await supabase.storage
                .from('images')  // bucket créé manuellement
                .upload(Date.now() + '_' + file.name, file);
            
            if (error) result.innerHTML = '❌ Erreur: ' + error.message;
            else result.innerHTML = '✅ Succès! <br><img src="' + supabase.storage.from('images').getPublicUrl(data.path).data.publicUrl + '" width="200">';
        }
    </script>
</body>
</html>
