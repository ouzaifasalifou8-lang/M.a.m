<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>M.A.M Eshop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
</head>
<body>
    <h1>Nos Produits</h1>
    <div id="catalogue">Chargement...</div>

    <script>
        async function charger() {
            try {
                const produits = await getProduits();
                document.getElementById('catalogue').innerHTML = produits.map(p => `
                    <div><h3>${p.nom}</h3><p>${p.prix} FCFA</p></div>
                `).join('');
            } catch(e) {
                document.getElementById('catalogue').innerHTML = "Erreur : " + e.message;
            }
        }
        charger();
    </script>
</body>
</html>
