<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Test Upload - MAM Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #1e293b;
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        h1 {
            color: white;
            margin-bottom: 30px;
        }
        .preview {
            width: 200px;
            height: 200px;
            margin: 20px auto;
            background: #0f172a;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px dashed #334155;
        }
        .preview img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview span {
            color: #64748b;
            font-size: 48px;
        }
        input {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            margin: 10px 0;
        }
        button {
            width: 100%;
            padding: 14px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover {
            background: #2563eb;
        }
        button:disabled {
            background: #64748b;
            cursor: not-allowed;
        }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }
        .success {
            background: #10b98120;
            color: #10b981;
            border: 1px solid #10b981;
        }
        .error {
            background: #ef444420;
            color: #ef4444;
            border: 1px solid #ef4444;
        }
        .loading {
            background: #3b82f620;
            color: #3b82f6;
        }
        .url-box {
            margin-top: 20px;
            padding: 12px;
            background: #0f172a;
            border-radius: 10px;
            word-break: break-all;
            font-size: 12px;
            color: #94a3b8;
        }
        .copy-btn {
            background: #3b82f6;
            padding: 8px 16px;
            margin-top: 10px;
            width: auto;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Test Upload Photo</h1>
        
        <div class="preview" id="preview">
            <span>🖼️</span>
        </div>
        
        <input type="file" id="imageInput" accept="image/*">
        <button id="uploadBtn">⬆️ Upload vers Supabase</button>
        
        <div id="status"></div>
        <div id="urlResult" class="url-box" style="display:none;"></div>
    </div>

    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://rqoaclfelpezlbbnjwrl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DkkNbLwrx_k_JItaGhYzgw_JBWeflei';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let selectedFile = null;
        
        // Récupérer les éléments
        const imageInput = document.getElementById('imageInput');
        const preview = document.getElementById('preview');
        const uploadBtn = document.getElementById('uploadBtn');
        const statusDiv = document.getElementById('status');
        const urlResult = document.getElementById('urlResult');
        
        // Preview de l'image
        imageInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            selectedFile = file;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.innerHTML = `<img src="${e.target.result}" alt="Preview">`;
            };
            reader.readAsDataURL(file);
            
            // Cacher le résultat précédent
            urlResult.style.display = 'none';
            statusDiv.innerHTML = '';
        });
        
        // Upload
        uploadBtn.addEventListener('click', async function() {
            if (!selectedFile) {
                showStatus('❌ Sélectionnez une image d\'abord', 'error');
                return;
            }
            
            // Générer un nom unique
            const timestamp = Date.now();
            const fileName = `uploads/test_${timestamp}_${selectedFile.name}`;
            
            showStatus('⏳ Upload en cours...', 'loading');
            uploadBtn.disabled = true;
            
            try {
                // Upload vers Supabase Storage
                const { error: uploadError } = await supabase.storage
                    .from('product-images')
                    .upload(fileName, selectedFile);
                
                if (uploadError) {
                    if (uploadError.message.includes('bucket')) {
                        showStatus('❌ Le bucket "product-images" n\'existe pas. Créez-le dans Supabase Storage d\'abord.', 'error');
                    } else {
                        showStatus('❌ Erreur: ' + uploadError.message, 'error');
                    }
                    uploadBtn.disabled = false;
                    return;
                }
                
                // Obtenir l'URL publique
                const { data } = supabase.storage
                    .from('product-images')
                    .getPublicUrl(fileName);
                
                const publicUrl = data.publicUrl;
                
                // Afficher le succès
                showStatus('✅ Upload réussi !', 'success');
                urlResult.style.display = 'block';
                urlResult.innerHTML = `
                    <strong>URL publique :</strong><br>
                    <a href="${publicUrl}" target="_blank" style="color:#3b82f6;">${publicUrl}</a>
                    <br><br>
                    <button class="copy-btn" onclick="copyToClipboard('${publicUrl}')">📋 Copier URL</button>
                `;
                
                console.log('URL:', publicUrl);
                
                // Réinitialiser
                selectedFile = null;
                imageInput.value = '';
                preview.innerHTML = '<span>🖼️</span>';
                
            } catch (error) {
                showStatus('❌ Erreur: ' + error.message, 'error');
            } finally {
                uploadBtn.disabled = false;
            }
        });
        
        function showStatus(message, type) {
            statusDiv.className = `status ${type}`;
            statusDiv.innerHTML = message;
        }
        
        // Fonction copy globale
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(function() {
                showStatus('✅ URL copiée dans le presse-papier', 'success');
            }).catch(function() {
                showStatus('❌ Erreur lors de la copie', 'error');
            });
        };
        
        // Test de connexion au chargement
        async function testConnection() {
            showStatus('🔌 Test de connexion à Supabase...', 'loading');
            try {
                const { data, error } = await supabase.storage.listBuckets();
                if (error) {
                    showStatus('⚠️ Connecté mais vérifiez le bucket "product-images"', 'error');
                } else {
                    const bucketExists = data.some(b => b.name === 'product-images');
                    if (bucketExists) {
                        showStatus('✅ Connexion OK - Bucket "product-images" trouvé', 'success');
                    } else {
                        showStatus('⚠️ Connecté mais le bucket "product-images" n\'existe pas. Créez-le dans Storage.', 'error');
                    }
                }
            } catch (error) {
                showStatus('❌ Erreur de connexion: ' + error.message, 'error');
            }
        }
        
        testConnection();
    </script>
</body>
</html>
