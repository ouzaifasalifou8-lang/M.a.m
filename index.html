<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Catalogue</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Nos Produits</h1>
    <div id="catalog">Chargement...</div>

    <script>
        const supabase = supabase.createClient('https://myxxcaaveqbwsujckxhj.supabase.co', 'sb_publishable_A-8fk-zlmgdcTc3WAcx7fA_A0Z0SSJy');

        async function init() {
            try {
                const { data, error } = await supabase.from('products').select('*');
                if (error) throw error;
                
                if (!data || data.length === 0) {
                    document.getElementById('catalog').innerHTML = "Aucun produit trouvé.";
                } else {
                    document.getElementById('catalog').innerHTML = data.map(p => `
                        <div><h3>${p.name}</h3><p>${p.price} FCFA</p></div>
                    `).join('');
                }
            } catch (err) {
                document.getElementById('catalog').innerHTML = "Erreur : " + err.message;
            }
        }
        init();
    </script>
</body>
</html>
