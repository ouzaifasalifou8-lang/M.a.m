<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>M.A.Mshop - Boutique</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 p-6">
    <h1 class="text-3xl font-bold text-center mb-8">Nos Produits</h1>
    
    <div id="productList" class="grid grid-cols-1 md:grid-cols-3 gap-6">
        </div>

    <script>
        // Initialisation
        const supabase = window.supabase.createClient(
            'https://dzbomxdmnznzykppbguh.supabase.co', 
            'votre-clé-anon-ici' // REMPLACEZ PAR VOTRE VRAIE CLÉ
        );

        async function fetchProducts() {
            const { data, error } = await supabase
                .from('products')
                .select('*');

            if (error) {
                console.error("Erreur:", error.message);
                return;
            }

            const container = document.getElementById('productList');
            container.innerHTML = data.map(product => `
                <div class="bg-white p-4 rounded shadow">
                    <h2 class="font-bold text-xl">${product.name}</h2>
                    <p class="text-gray-600">${product.price || 0} FCFA</p>
                </div>
            `).join('');
        }

        fetchProducts();
    </script>
</body>
</html>
