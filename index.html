<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Galerie - MAM Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: system-ui, sans-serif;
            background: #0f172a;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-4px);
        }
        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }
        .card .info {
            padding: 12px;
            color: #cbd5e1;
            font-size: 12px;
            word-break: break-all;
        }
        .card .filename {
            color: white;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .card .url {
            font-size: 11px;
            color: #3b82f6;
        }
        .loading {
            text-align: center;
            color: #94a3b8;
            padding: 60px;
        }
        .error {
            text-align: center;
            color: #ef4444;
            padding: 60px;
            background: #1e293b;
            border-radius: 16px;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin: 20px auto;
            display: block;
        }
        button:hover {
            background: #2563eb;
        }
        .refresh {
            text-align: center;
            margin-bottom: 20px;
        }
        .stats {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Galerie des photos uploadées</h1>
        
        <div class="refresh">
            <button onclick="loadImages()">🔄 Rafraîchir</button>
        </div>
        
        <div id="stats" class="stats"></div>
        <div id="gallery" class="gallery">
            <div class="loading">⏳ Chargement des images...</div>
        </div>
    </div>

    <script>
        // Configuration Supabase
        const SUPABASE_URL = 'https://rqoaclfelpezlbbnjwrl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DkkNbLwrx_k_JItaGhYzgw_JBWeflei';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        async function loadImages() {
            const galleryDiv = document.getElementById('gallery');
            const statsDiv = document.getElementById('stats');
            
            galleryDiv.innerHTML = '<div class="loading">⏳ Chargement des images...</div>';
            
            try {
                // Lister tous les fichiers dans le bucket product-images
                const { data, error } = await supabase.storage
                    .from('product-images')
                    .list('uploads', {
                        limit: 100,
                        offset: 0,
                        sortBy: { column: 'created_at', order: 'desc' }
                    });
                
                if (error) {
                    // Essayer sans dossier uploads
                    const { data: rootData, error: rootError } = await supabase.storage
                        .from('product-images')
                        .list('', {
                            limit: 100,
                            sortBy: { column: 'created_at', order: 'desc' }
                        });
                    
                    if (rootError) {
                        throw rootError;
                    }
                    displayImages(rootData, statsDiv, galleryDiv);
                } else {
                    displayImages(data, statsDiv, galleryDiv);
                }
                
            } catch (error) {
                console.error('Erreur:', error);
                galleryDiv.innerHTML = `
                    <div class="error">
                        ❌ Erreur: ${error.message}<br><br>
                        <small>Vérifiez que le bucket "product-images" existe et est public</small>
                    </div>
                `;
            }
        }
        
        function displayImages(files, statsDiv, galleryDiv) {
            if (!files || files.length === 0) {
                galleryDiv.innerHTML = `
                    <div class="error">
                        📭 Aucune image trouvée<br><br>
                        <small>Uploader d'abord des images avec test-upload.html</small>
                    </div>
                `;
                statsDiv.innerHTML = '0 image';
                return;
            }
            
            // Filtrer uniquement les images
            const images = files.filter(f => 
                f.name.match(/\.(jpg|jpeg|png|gif|webp)$/i)
            );
            
            statsDiv.innerHTML = `📸 ${images.length} image(s)`;
            
            if (images.length === 0) {
                galleryDiv.innerHTML = `
                    <div class="error">
                        📭 Aucune image trouvée<br><br>
                        <small>Uploader d'abord des images avec test-upload.html</small>
                    </div>
                `;
                return;
            }
            
            galleryDiv.innerHTML = images.map(file => {
                // Obtenir l'URL publique
                const { data } = supabase.storage
                    .from('product-images')
                    .getPublicUrl(file.name);
                
                return `
                    <div class="card">
                        <img src="${data.publicUrl}" alt="${file.name}" onerror="this.src='https://placehold.co/400x200/1e293b/64748b?text=Erreur+chargement'">
                        <div class="info">
                            <div class="filename">📄 ${file.name}</div>
                            <div class="url">🔗 ${formatDate(file.created_at)}</div>
                            <div class="url">📏 ${formatSize(file.metadata?.size || 0)}</div>
                            <div class="url">
                                <a href="${data.publicUrl}" target="_blank" style="color:#3b82f6;">Voir l'image →</a>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function formatDate(dateStr) {
            if (!dateStr) return 'Date inconnue';
            const date = new Date(dateStr);
            return date.toLocaleDateString('fr-FR') + ' ' + date.toLocaleTimeString('fr-FR');
        }
        
        function formatSize(bytes) {
            if (!bytes) return '0 o';
            if (bytes < 1024) return bytes + ' o';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' Ko';
            return (bytes / (1024 * 1024)).toFixed(1) + ' Mo';
        }
        
        // Charger au démarrage
        loadImages();
    </script>
</body>
</html>
