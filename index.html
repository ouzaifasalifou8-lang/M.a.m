<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Boutique MAMshop</title>
</head>
<body>
    <h1>Nos Produits</h1>
    <div id="liste-produits">Chargement en cours...</div>

    <script>
        async function chargerProduits() {
            try {
                // On appelle votre API Vercel qui communique avec Turso
                const response = await fetch('/api/produits');
                const produits = await response.json();
                
                const conteneur = document.getElementById('liste-produits');
                
                if (produits.length === 0) {
                    conteneur.innerHTML = "Aucun produit pour le moment.";
                    return;
                }

                // On affiche la liste des produits
                conteneur.innerHTML = produits.map(p => 
                    `<div style="border: 1px solid #ddd; padding: 10px; margin: 10px; border-radius: 5px;">
                        <h3>${p.nom}</h3>
                     </div>`
                ).join('');
                
            } catch (err) {
                document.getElementById('liste-produits').innerHTML = "Erreur de chargement : " + err.message;
            }
        }

        // Lancer le chargement au démarrage
        chargerProduits();
    </script>
</body>
</html>
