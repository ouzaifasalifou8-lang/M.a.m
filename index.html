<!DOCTYPE html>
<html>
<body>
    <h1>MAMshop</h1>
    <div id="liste">Chargement...</div>

    <script>
        async function charger() {
            const res = await fetch('/api/produits');
            const data = await res.json();
            document.getElementById('liste').innerHTML = data.map(p => 
                `<div><h3>${p.nom}</h3><img src="${p.image_url}" width="200"></div>`
            ).join('');
        }
        charger();
    </script>
</body>
</html>
