<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mon Compte - MAM Shop</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav>
  <div class="nav-inner">
    <a href="index.html" class="logo"><div class="logo-icon">M</div>MAM Shop</a>
    <div class="nav-links"><a href="index.html">Accueil</a><a href="boutique.html">Boutique</a></div>
    <div class="nav-actions">
      <button class="cart-btn" onclick="location.href='panier.html'">🛒<span class="cart-count" style="display:none">0</span></button>
    </div>
  </div>
</nav>

<div style="max-width:420px;margin:60px auto;padding:0 20px">
  <div style="text-align:center;margin-bottom:28px">
    <div style="font-size:52px;margin-bottom:12px">👤</div>
    <h1 style="font-size:26px;font-weight:800;margin-bottom:6px">Mon Compte</h1>
    <p style="color:#64748b;font-size:14px">Connectez-vous pour acceder a votre espace</p>
  </div>

  <div id="login-form" style="background:white;padding:28px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,.08)">
    <div style="margin-bottom:15px">
      <label style="display:block;font-size:13px;font-weight:600;color:#64748b;margin-bottom:6px">Email</label>
      <input id="email" type="email" placeholder="votre@email.com" style="width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none">
    </div>
    <div style="margin-bottom:20px">
      <label style="display:block;font-size:13px;font-weight:600;color:#64748b;margin-bottom:6px">Mot de passe</label>
      <input id="pass" type="password" placeholder="••••••••" style="width:100%;padding:11px 14px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;outline:none"
        onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button onclick="doLogin()" style="width:100%;padding:13px;background:#2563eb;color:white;border:none;border-radius:11px;font-weight:800;font-size:15px;cursor:pointer">
      Connexion
    </button>
    <div style="text-align:center;margin-top:16px;font-size:14px;color:#64748b">
      Pas de compte ? <a href="inscription.html" style="color:#2563eb;font-weight:600">S'inscrire</a>
    </div>
    <div style="text-align:center;margin-top:10px;font-size:13px">
      <a href="vendeur.html" style="color:#7c3aed;font-weight:600">Espace vendeur →</a>
    </div>
  </div>
</div>

<footer>
  <div class="footer-bottom" style="padding:20px">© 2026 MAM Shop - Tous droits reserves</div>
</footer>

<script src="js/api.js"></script>
<script>
function doLogin(){
  const email=document.getElementById('email').value;
  if(!email){showToast('Email requis !');return;}
  showToast('Connexion en cours...','success');
  setTimeout(()=>{location.href='index.html';},1500);
}
</script>
</body>
</html>
