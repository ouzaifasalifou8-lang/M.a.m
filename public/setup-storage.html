<!DOCTYPE html>
<html>
<head>
    <title>Configuration Storage</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #0f172a; color: white; font-family: monospace; padding: 20px; }
        .success { color: #10b981; }
        .error { color: #ef4444; }
        pre { background: #1e293b; padding: 10px; border-radius: 8px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔧 Configuration Supabase Storage</h1>
    <div id="output"></div>

    <script>
        const SUPABASE_URL = 'https://rqoaclfelpezlbbnjwrl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DkkNbLwrx_k_JItaGhYzgw_JBWeflei';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const output = document.getElementById('output');
        
        async function checkAndFix() {
            output.innerHTML += '<p>📡 Connexion à Supabase...</p>';
            
            // Lister les buckets
            const { data: buckets, error } = await supabase.storage.listBuckets();
            
            if (error) {
                output.innerHTML += `<p class="error">❌ Erreur: ${error.message}</p>`;
                return;
            }
            
            output.innerHTML += `<p>📦 Buckets existants: ${buckets.map(b => b.name).join(', ') || 'aucun'}</p>`;
            
            const bucketExists = buckets.some(b => b.name === 'product-images');
            
            if (!bucketExists) {
                output.innerHTML += `<p class="error">⚠️ Le bucket "product-images" n'existe pas !</p>`;
                output.innerHTML += `<p>📌 Pour le créer:</p>`;
                output.innerHTML += `<pre>
1. Allez sur: https://supabase.com/dashboard/project/rqoaclfelpezlbbnjwrl/storage
2. Cliquez "New bucket"
3. Nom: product-images
4. Cochez "Public bucket"
5. Cliquez "Create bucket"
6. Puis dans "Policies", ajoutez "Give public access"
                </pre>`;
            } else {
                output.innerHTML += `<p class="success">✅ Bucket "product-images" existe !</p>`;
                
                // Vérifier les fichiers
                const { data: files } = await supabase.storage.from('product-images').list('');
                output.innerHTML += `<p>📸 Fichiers dans le bucket: ${files?.length || 0}</p>`;
                
                if (files && files.length > 0) {
                    output.innerHTML += `<p>Liste des fichiers:</p><ul>`;
                    files.forEach(f => {
                        const { data } = supabase.storage.from('product-images').getPublicUrl(f.name);
                        output.innerHTML += `<li>📄 ${f.name} → <a href="${data.publicUrl}" target="_blank" style="color:#3b82f6;">Voir</a></li>`;
                    });
                    output.innerHTML += `</ul>`;
                }
            }
        }
        
        checkAndFix();
    </script>
</body>
</html>
