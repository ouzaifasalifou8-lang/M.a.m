<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin MAM Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, sans-serif; background: #0f172a; }
        
        /* Layout */
        .admin-layout { display: flex; min-height: 100vh; }
        .sidebar {
            width: 280px;
            background: #0f172a;
            border-right: 1px solid #1e293b;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo { padding: 24px 20px; border-bottom: 1px solid #1e293b; }
        .sidebar-logo h2 { color: white; font-size: 20px; }
        .sidebar-logo p { color: #94a3b8; font-size: 12px; margin-top: 4px; }
        
        .sidebar-btn {
            width: 100%;
            padding: 12px 20px;
            text-align: left;
            background: none;
            border: none;
            color: #cbd5e1;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 14px;
        }
        .sidebar-btn:hover { background: #1e293b; }
        .sidebar-btn.active { background: #1e293b; color: #3b82f6; border-left: 3px solid #3b82f6; }
        
        .admin-content {
            margin-left: 280px;
            flex: 1;
            padding: 24px 32px;
        }
        .admin-title {
            font-size: 24px;
            font-weight: 800;
            color: white;
            margin-bottom: 24px;
        }
        
        /* Formulaires */
        .form-box {
            background: #1e293b;
            border-radius: 20px;
            padding: 24px;
            max-width: 600px;
        }
        .form-group { margin-bottom: 18px; }
        .form-group label {
            display: block;
            color: #cbd5e1;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%;
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: white;
            font-size: 14px;
        }
        
        /* Preview image */
        .image-preview {
            margin-top: 12px;
            position: relative;
            display: inline-block;
        }
        .image-preview img {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #334155;
        }
        .remove-image {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
        }
        
        /* Grille produits */
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 24px;
        }
        .product-card {
            background: #1e293b;
            border-radius: 16px;
            overflow: hidden;
        }
        .product-img {
            height: 180px;
            background: #0f172a;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .product-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-img span {
            font-size: 48px;
        }
        .product-info { padding: 16px; }
        .product-name { color: white; font-weight: 700; margin-bottom: 4px; }
        .product-price { color: #3b82f6; font-weight: 700; font-size: 18px; margin: 8px 0; }
        .product-stock { color: #94a3b8; font-size: 12px; margin-bottom: 12px; }
        
        .action-buttons { display: flex; gap: 8px; }
        .action-buttons button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-edit { background: #3b82f6; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        
        /* Stats */
        .stat-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .stat-card {
            background: #1e293b;
            border-radius: 16px;
            padding: 20px;
            border-left: 4px solid #3b82f6;
        }
        .stat-card .num { font-size: 32px; font-weight: 800; color: white; }
        .stat-card .lbl { color: #94a3b8; font-size: 13px; margin-top: 4px; }
        
        /* Table */
        .table-box {
            background: #1e293b;
            border-radius: 16px;
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #334155;
            color: #e2e8f0;
        }
        th { background: #0f172a; color: #94a3b8; }
        
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1e293b;
            padding: 12px 24px;
            border-radius: 12px;
            border-left: 4px solid #10b981;
            color: white;
            z-index: 9999;
        }
        
        button:disabled { opacity: 0.6; cursor: not-allowed; }
    </style>
</head>
<body>
    <div class="admin-layout">
        <div class="sidebar">
            <div class="sidebar-logo">
                <h2>🛍️ MAM Shop</h2>
                <p>Administration</p>
            </div>
            <button class="sidebar-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="sidebar-btn" data-tab="products">🛍️ Produits</button>
            <button class="sidebar-btn" data-tab="add-product">➕ Ajouter produit</button>
            <button class="sidebar-btn" data-tab="categories">📂 Catégories</button>
        </div>

        <div class="admin-content">
            <div id="loading" style="text-align:center;padding:60px;color:#94a3b8;">⏳ Chargement...</div>
            
            <div id="main-content" style="display:none">
                <!-- Dashboard -->
                <div id="tab-dashboard" class="tab-content">
                    <div class="admin-title">📊 Dashboard</div>
                    <div class="stat-cards">
                        <div class="stat-card"><div class="num" id="s-products">0</div><div class="lbl">Produits</div></div>
                        <div class="stat-card"><div class="num" id="s-categories">0</div><div class="lbl">Catégories</div></div>
                        <div class="stat-card"><div class="num" id="s-featured">0</div><div class="lbl">Vedettes</div></div>
                    </div>
                    <div class="table-box">
                        <table>
                          <thead><tr><th>Photo</th><th>Nom</th><th>Prix</th><th>Stock</th></tr></thead>
                            <tbody id="dashboard-products"></tbody>
                        </table>
                    </div>
                </div>

                <!-- Produits -->
                <div id="tab-products" class="tab-content" style="display:none">
                    <div class="admin-title">🛍️ Produits</div>
                    <div id="products-grid" class="products-grid"></div>
                </div>

                <!-- Ajouter produit -->
                <div id="tab-add-product" class="tab-content" style="display:none">
                    <div class="admin-title">➕ Ajouter un produit</div>
                    <div class="form-box">
                        <div class="form-group"><label>Nom *</label><input id="p-name" placeholder="Nom du produit"></div>
                        <div class="form-group"><label>Description</label><textarea id="p-desc" rows="3"></textarea></div>
                        <div class="form-group"><label>Prix (FCFA) *</label><input id="p-price" type="number"></div>
                        <div class="form-group"><label>Stock</label><input id="p-stock" type="number" value="0"></div>
                        <div class="form-group"><label>Catégorie</label><select id="p-category"></select></div>
                        <div class="form-group">
                            <label>Photo</label>
                            <input type="file" id="p-image" accept="image/*">
                            <div id="image-preview" class="image-preview"></div>
                        </div>
                        <div class="form-group"><label><input type="checkbox" id="p-featured"> ⭐ Produit vedette</label></div>
                        <button id="save-btn" style="width:100%;padding:14px;background:#3b82f6;color:white;border:none;border-radius:10px;cursor:pointer;">💾 Enregistrer</button>
                    </div>
                </div>

                <!-- Catégories -->
                <div id="tab-categories" class="tab-content" style="display:none">
                    <div class="admin-title">📂 Catégories</div>
                    <div class="form-box" style="margin-bottom:24px;">
                        <div class="form-group"><label>Nouvelle catégorie</label><input id="new-cat" placeholder="Nom"></div>
                        <button id="add-cat-btn" style="background:#3b82f6;color:white;padding:10px 20px;border:none;border-radius:8px;cursor:pointer;">Ajouter</button>
                    </div>
                    <div class="table-box">
                        <table><thead><tr><th>Nom</th><th>Actions</th></tr></thead><tbody id="categories-list"></tbody></table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rqoaclfelpezlbbnjwrl.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_DkkNbLwrx_k_JItaGhYzgw_JBWeflei';
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        let products = [];
        let categories = [];
        let currentImageFile = null;
        let editId = null;
        
        async function init() {
            await Promise.all([loadCategories(), loadProducts()]);
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            loadDashboard();
            updateCategorySelect();
            setupEvents();
        }
        
        async function loadCategories() {
            const { data } = await supabase.from('categories').select('*').eq('is_active', true);
            categories = data || [];
            return categories;
        }
        
        async function loadProducts() {
            const { data } = await supabase.from('products').select('*, categories(name)').eq('is_active', true);
            products = (data || []).map(p => ({...p, category_name: p.categories?.name || 'Sans catégorie'}));
            return products;
        }
        
        function loadDashboard() {
            document.getElementById('s-products').textContent = products.length;
            document.getElementById('s-categories').textContent = categories.length;
            document.getElementById('s-featured').textContent = products.filter(p => p.is_featured).length;
            
            const tbody = document.getElementById('dashboard-products');
            tbody.innerHTML = products.slice(0,5).map(p => `
                <tr>
                    <td>${p.image_url ? `<img src="${p.image_url}" style="width:40px;height:40px;object-fit:cover;border-radius:6px;">` : '📦'}</td>
                    <td>${escapeHtml(p.name)}</td>
                    <td>${p.price.toLocaleString()} FCFA</td>
                    <td>${p.stock || 0}</td>
                </tr>
            `).join('');
        }
        
        function displayProducts() {
            const grid = document.getElementById('products-grid');
            if (products.length === 0) {
                grid.innerHTML = '<div style="text-align:center;padding:60px;color:#64748b;">Aucun produit</div>';
                return;
            }
            grid.innerHTML = products.map(p => `
                <div class="product-card">
                    <div class="product-img">
                        ${p.image_url ? `<img src="${p.image_url}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%22100%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 fill=%22%23334155%22/%3E%3Ctext x=%2250%22 y=%2250%22 text-anchor=%22middle%22 dy=%22.3em%22 fill=%22%2394a3b8%22%3E🛍️%3C/text%3E%3C/svg%3E'">` : '<span>🛍️</span>'}
                    </div>
                    <div class="product-info">
                        <div class="product-name">${escapeHtml(p.name)}</div>
                        <div class="product-price">${p.price.toLocaleString()} FCFA</div>
                        <div class="product-stock">Stock: ${p.stock || 0}</div>
                        <div class="action-buttons">
                            <button class="btn-edit" onclick="editProduct(${p.id})">✏️ Modifier</button>
                            <button class="btn-delete" onclick="deleteProduct(${p.id})">🗑️ Supprimer</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }
        
        async function updateCategorySelect() {
            await loadCategories();
            const select = document.getElementById('p-category');
            select.innerHTML = categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }
        
        function displayCategories() {
            const tbody = document.getElementById('categories-list');
            tbody.innerHTML = categories.map(c => `
                <tr>
                    <td>${escapeHtml(c.name)}</td>
                    <td><button onclick="deleteCategory(${c.id})" style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:6px;cursor:pointer;">Supprimer</button></td>
                </tr>
            `).join('');
        }
        
        function setupImageUpload() {
            const fileInput = document.getElementById('p-image');
            fileInput.onchange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                currentImageFile = file;
                const reader = new FileReader();
                reader.onload = (e) => {
                    document.getElementById('image-preview').innerHTML = `
                        <div style="position:relative;display:inline-block;">
                            <img src="${e.target.result}">
                            <button type="button" class="remove-image" onclick="clearImage()">✕</button>
                        </div>
                    `;
                };
                reader.readAsDataURL(file);
            };
        }
        
        window.clearImage = () => {
            currentImageFile = null;
            document.getElementById('image-preview').innerHTML = '';
            document.getElementById('p-image').value = '';
        };
        
        async function uploadImage(productId) {
            if (!currentImageFile) return null;
            const ext = currentImageFile.name.split('.').pop();
            const fileName = `products/${productId}_${Date.now()}.${ext}`;
            const { error } = await supabase.storage.from('product-images').upload(fileName, currentImageFile);
            if (error) { showToast('Erreur upload: ' + error.message, 'error'); return null; }
            const { data } = supabase.storage.from('product-images').getPublicUrl(fileName);
            return data.publicUrl;
        }
        
        document.getElementById('save-btn').onclick = async () => {
            const name = document.getElementById('p-name').value.trim();
            const price = parseFloat(document.getElementById('p-price').value);
            const stock = parseInt(document.getElementById('p-stock').value) || 0;
            const categoryId = parseInt(document.getElementById('p-category').value);
            const is_featured = document.getElementById('p-featured').checked;
            
            if (!name || isNaN(price)) {
                showToast('Nom et prix requis', 'error');
                return;
            }
            
            const productData = { name, price, stock, category_id: categoryId, is_featured, is_active: true };
            
            let result;
            if (editId) {
                result = await supabase.from('products').update(productData).eq('id', editId);
            } else {
                result = await supabase.from('products').insert([productData]).select();
            }
            
            if (result.error) { showToast('Erreur: ' + result.error.message, 'error'); return; }
            
            let productId = editId;
            if (!editId && result.data) productId = result.data[0].id;
            
            if (currentImageFile && productId) {
                const imageUrl = await uploadImage(productId);
                if (imageUrl) await supabase.from('products').update({ image_url: imageUrl }).eq('id', productId);
            }
            
            showToast(editId ? 'Produit modifié' : 'Produit ajouté');
            resetForm();
            await loadProducts();
            loadDashboard();
            displayProducts();
        };
        
        window.editProduct = async (id) => {
            const p = products.find(p => p.id === id);
            if (!p) return;
            editId = id;
            document.getElementById('p-name').value = p.name;
            document.getElementById('p-desc').value = p.description || '';
            document.getElementById('p-price').value = p.price;
            document.getElementById('p-stock').value = p.stock;
            document.getElementById('p-category').value = p.category_id;
            document.getElementById('p-featured').checked = p.is_featured;
            if (p.image_url) {
                document.getElementById('image-preview').innerHTML = `<div style="position:relative;"><img src="${p.image_url}" style="width:150px;"><button class="remove-image" onclick="clearImage()">✕</button></div>`;
            }
            document.getElementById('save-btn').textContent = '✏️ Mettre à jour';
            document.querySelector('[data-tab="add-product"]').click();
        };
        
        window.deleteProduct = async (id) => {
            if (!confirm('Supprimer ce produit ?')) return;
            await supabase.from('products').update({ is_active: false }).eq('id', id);
            await loadProducts();
            loadDashboard();
            displayProducts();
            showToast('Produit supprimé');
        };
        
        document.getElementById('add-cat-btn').onclick = async () => {
            const name = document.getElementById('new-cat').value.trim();
            if (!name) return;
            await supabase.from('categories').insert([{ name, slug: name.toLowerCase().replace(/\s+/g, '-'), is_active: true }]);
            document.getElementById('new-cat').value = '';
            await loadCategories();
            displayCategories();
            updateCategorySelect();
            showToast('Catégorie ajoutée');
        };
        
        window.deleteCategory = async (id) => {
            const used = products.some(p => p.category_id === id);
            if (used) { showToast('Catégorie utilisée par des produits', 'error'); return; }
            await supabase.from('categories').update({ is_active: false }).eq('id', id);
            await loadCategories();
            displayCategories();
            updateCategorySelect();
            showToast('Catégorie supprimée');
        };
        
        function resetForm() {
            document.getElementById('p-name').value = '';
            document.getElementById('p-desc').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-stock').value = '0';
            document.getElementById('p-featured').checked = false;
            clearImage();
            editId = null;
            document.getElementById('save-btn').textContent = '💾 Enregistrer';
        }
        
        function escapeHtml(text) { if (!text) return ''; return text.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }
        
        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.borderLeftColor = type === 'error' ? '#ef4444' : '#10b981';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }
        
        function setupEvents() {
            document.querySelectorAll('.sidebar-btn').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');
                  document.getElementById(`tab-${btn.dataset.tab}`).style.display = 'block';
                    document.querySelectorAll('.sidebar-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    if (btn.dataset.tab === 'products') displayProducts();
                    if (btn.dataset.tab === 'categories') displayCategories();
                    if (btn.dataset.tab === 'add-product') resetForm();
                };
            });
            setupImageUpload();
        }
        
        init();
    </script>
</body>
</html>
